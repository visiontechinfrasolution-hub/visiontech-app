name: Kishor AI Agent

on:
  schedule:
    - cron: '*/10 * * * *' 
  workflow_dispatch:      

jobs:
  run-kishor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' # <--- ही सर्वात महत्त्वाची ओळ आहे!

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install requests pandas supabase google-genai # <--- नवीन लायब्ररी

      - name: Execute Kishor Brain
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python kishor_agent.py
