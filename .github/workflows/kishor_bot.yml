name: Kishor AI Agent

on:
  schedule:
    - cron: '*/10 * * * *' 
  workflow_dispatch:      

jobs:
  run-kishor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 # v3 ऐवजी v4 करा

      - name: Setup Python
        uses: actions/setup-python@v5 # v4 ऐवजी v5 करा
        with:
          python-version: '3.11' # 3.9 ऐवजी 3.11 करा
          cache: 'pip'

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install requests pandas supabase google-genaiी

      - name: Execute Kishor Brain
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python kishor_agent.py
